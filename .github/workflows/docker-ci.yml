name: Build and Push Docker images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build images with docker compose
        working-directory: async-job-queue
        run: |
          docker compose build

      - name: Tag images
        run: |
          docker tag async-job-queue-api ${{ secrets.DOCKERHUB_USERNAME }}/queue-api:latest
          docker tag async-job-queue-worker ${{ secrets.DOCKERHUB_USERNAME }}/queue-worker:latest

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/queue-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/queue-worker:latest