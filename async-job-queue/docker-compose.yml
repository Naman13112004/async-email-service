version: "3.9"

services:
  myredis:
    image: redis:latest
    container_name: myredis
    ports:
      - "6379:6379"
    
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: queue-api
    ports:
      - "3000:3000"
    depends_on:
      - myredis

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: queue-worker
    depends_on:
      - myredis
